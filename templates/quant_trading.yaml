# 量化交易行业模板
template: quant_trading
display_name: "量化交易监控"

agent_meta:
  "plan":
    display_name: "基金经理"
    group: "最高决策层"
    color: "#3b82f6"
  "build":
    display_name: "策略开发"
    group: "策略开发层"
    color: "#22c55e"
  "explore":
    display_name: "研报分析"
    group: "情报收集层"
    color: "#a855f7"

alert_rules:
  - name: "extreme_cost"
    description: "单会话成本超限"
    metric: "session_cost"
    condition: ">"
    threshold: 50.0
    level: "critical"
  - name: "drawdown_alert"
    description: "连续亏损告警"
    metric: "tool_failure_pct"
    condition: ">"
    threshold: 15
    level: "warn"
  - name: "position_concentration"
    description: "持仓集中度过高"
    metric: "agent_idle_ratio"
    condition: ">"
    threshold: 60
    level: "warn"
